services:
  - type: web
    name: jovempano-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_db_auto.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        value: sqlite:///./jovempano.db
    disk:
      name: jovempano-db
      mountPath: /opt/render/project/src
      sizeGB: 1
