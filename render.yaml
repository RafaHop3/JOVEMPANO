services:
  - type: web
    name: jovempano-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_db_auto.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      # ADMIN_PASSWORD: set manually in the Render dashboard — do NOT hardcode here.
      # Default fallback is "admin123" if not set (change immediately after first deploy).
      - key: DATABASE_URL
        # 4 slashes = absolute path, pointing inside the persistent disk mount
        value: sqlite:////opt/render/project/src/jovempano.db
    disk:
      name: jovempano-db
      mountPath: /opt/render/project/src
      sizeGB: 1
