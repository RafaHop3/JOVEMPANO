name: Keep-Alive Cron

on:
  schedule:
    - cron: '*/10 * * * *' # Roda a cada 10 minutos
  workflow_dispatch: # Permite rodar manualmente para teste

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          URL="${{ secrets.RENDER_URL || 'https://jovempano-backend.onrender.com/ping' }}"
          echo "Pinging $URL..."
          curl -s -f "$URL" || echo "Ping falhou. Certifique-se de que o backend está online."
